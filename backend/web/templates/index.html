<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>autobot - 移动端自动化机器人</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 顶部导航 -->
    <div class="header">
        <h1>🤖 autobot</h1>
        <div class="status-bar">
            <span class="status-badge">设备: <b id="deviceCount">0</b></span>
            <span class="status-badge">空闲: <b id="idleCount">0</b></span>
            <span class="status-badge">任务: <b id="taskCount">0</b></span>
        </div>
    </div>

    <div class="container">
        <div class="panel-grid">
            <!-- 设备列表 -->
            <div class="panel">
                <div class="panel-header">
                    <h3>已连接设备</h3>
                    <button class="btn btn-sm btn-default" onclick="refreshDevices()">刷新</button>
                </div>
                <div class="panel-body device-list" id="deviceList">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <!-- 任务列表 -->
            <div class="panel">
                <div class="panel-header">
                    <h3>任务列表</h3>
                    <button class="btn btn-sm btn-default" onclick="refreshTasks()">刷新</button>
                </div>
                <div class="panel-body" id="taskList">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <!-- 创建任务 -->
            <div class="panel panel-full">
                <div class="panel-header">
                    <h3>创建新任务</h3>
                    <div style="display:flex; gap:8px;">
                        <label style="display:flex; align-items:center; gap:4px; cursor:pointer;">
                            <input type="radio" name="taskMode" id="normalMode" checked onchange="switchTaskMode()">
                            <span>普通任务</span>
                        </label>
                        <label style="display:flex; align-items:center; gap:4px; cursor:pointer;">
                            <input type="radio" name="taskMode" id="advancedMode" onchange="switchTaskMode()">
                            <span>高级任务（浏览+互动）</span>
                        </label>
                    </div>
                </div>
                <div class="panel-body">
                    <!-- 基础信息 -->
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
                        <div>
                            <div class="form-group">
                                <label>任务名称 *</label>
                                <input class="form-control" id="taskName" placeholder="例如：每天上午刷抖音10分钟"/>
                            </div>
                            <div class="form-group">
                                <label>描述</label>
                                <textarea class="form-control" id="taskDesc" placeholder="任务描述（可选）"></textarea>
                            </div>
                        </div>
                        <div>
                            <div class="form-group">
                                <label>定时执行</label>
                                <select class="form-control" id="scheduleType">
                                    <option value="">手动执行</option>
                                    <option value="cron">Cron 定时</option>
                                    <option value="interval">间隔执行</option>
                                </select>
                            </div>
                            <div id="cronConfig" style="display:none">
                                <div class="form-group">
                                    <label>Cron 规则</label>
                                    <div class="schedule-config">
                                        <span>每天</span>
                                        <input class="form-control" id="cronHour" placeholder="时" value="9"/>
                                        <span>:</span>
                                        <input class="form-control" id="cronMinute" placeholder="分" value="0"/>
                                    </div>
                                </div>
                            </div>
                            <div id="intervalConfig" style="display:none">
                                <div class="form-group">
                                    <label>间隔执行</label>
                                    <div class="schedule-config">
                                        <span>每</span>
                                        <input class="form-control" id="intervalMinutes" value="30"/>
                                        <span>分钟执行一次</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 普通任务模式 -->
                    <div id="normalTaskSection">
                        <div class="form-group">
                            <label>目标应用</label>
                            <select class="form-control" id="taskApp">
                                <option value="">通用操作</option>
                                <option value="wechat">微信</option>
                                <option value="douyin">抖音</option>
                                <option value="xiaohongshu">小红书</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>操作步骤</label>
                            <div id="actionList"></div>
                            <button class="btn btn-sm btn-default" onclick="addAction()" style="margin-top:8px">+ 添加步骤</button>
                        </div>
                    </div>

                    <!-- 高级任务模式 -->
                    <div id="advancedTaskSection" style="display:none;">
                        <div class="form-group">
                            <label>目标应用 *</label>
                            <select class="form-control" id="advApp">
                                <option value="xiaohongshu">小红书</option>
                                <option value="douyin">抖音</option>
                                <option value="wechat">微信</option>
                            </select>
                        </div>

                        <!-- 主题词配置 -->
                        <div class="form-group">
                            <label>主题词（一行一个）</label>
                            <textarea class="form-control" id="advTopics" placeholder="浙江&#10;体育&#10;旅游&#10;美食"></textarea>
                        </div>

                        <!-- 动作配置 -->
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px;">
                            <div>
                                <label style="display:flex; align-items:center; gap:8px;">
                                    <input type="checkbox" id="advLikeEnabled">
                                    <span>点赞</span>
                                </label>
                                <div class="form-group">
                                    <label>比例（0-1）</label>
                                    <input type="number" class="form-control" id="advLikeRate" step="0.01" value="0.1" min="0" max="1">
                                </div>
                            </div>
                            <div>
                                <label style="display:flex; align-items:center; gap:8px;">
                                    <input type="checkbox" id="advCommentEnabled">
                                    <span>评论</span>
                                </label>
                                <div class="form-group">
                                    <label>比例（0-1）</label>
                                    <input type="number" class="form-control" id="advCommentRate" step="0.01" value="0.05" min="0" max="1">
                                </div>
                            </div>
                            <div>
                                <label style="display:flex; align-items:center; gap:8px;">
                                    <input type="checkbox" id="advMentionEnabled">
                                    <span>@用户</span>
                                </label>
                                <div class="form-group">
                                    <label>比例（0-1）</label>
                                    <input type="number" class="form-control" id="advMentionRate" step="0.01" value="0.03" min="0" max="1">
                                </div>
                            </div>
                        </div>

                        <!-- 评论模板和@用户 -->
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;">
                            <div class="form-group">
                                <label>评论模板（一行一个）</label>
                                <textarea class="form-control" id="advCommentTemplates" placeholder="太棒了！&#10;学到了！&#10;支持支持&#10;666"></textarea>
                            </div>
                            <div class="form-group">
                                <label>@用户列表（一行一个）</label>
                                <textarea class="form-control" id="advMentionUsers" placeholder="user1&#10;user2"></textarea>
                            </div>
                        </div>

                        <!-- 时间配置 -->
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:12px; margin-bottom:12px;">
                            <div class="form-group">
                                <label>浏览间隔（秒）</label>
                                <div style="display:flex; gap:8px;">
                                    <input type="number" class="form-control" id="advViewMin" value="2" min="0.1">
                                    <span>-</span>
                                    <input type="number" class="form-control" id="advViewMax" value="4" min="0.1">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>点赞间隔（秒）</label>
                                <div style="display:flex; gap:8px;">
                                    <input type="number" class="form-control" id="advLikeMin" value="0.5" min="0.1">
                                    <span>-</span>
                                    <input type="number" class="form-control" id="advLikeMax" value="1.5" min="0.1">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>评论间隔（秒）</label>
                                <div style="display:flex; gap:8px;">
                                    <input type="number" class="form-control" id="advCommentMin" value="2" min="0.1">
                                    <span>-</span>
                                    <input type="number" class="form-control" id="advCommentMax" value="5" min="0.1">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>@间隔（秒）</label>
                                <div style="display:flex; gap:8px;">
                                    <input type="number" class="form-control" id="advMentionMin" value="1" min="0.1">
                                    <span>-</span>
                                    <input type="number" class="form-control" id="advMentionMax" value="3" min="0.1">
                                </div>
                            </div>
                        </div>

                        <!-- 强制工作和休眠 -->
                        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:12px;">
                            <div class="form-group">
                                <label>强制工作（分钟）</label>
                                <input type="number" class="form-control" id="advForceWorkMin" value="60" min="1">
                            </div>
                            <div class="form-group">
                                <label>强制休眠（分钟）</label>
                                <input type="number" class="form-control" id="advForceSleepMin" value="30" min="1">
                            </div>
                            <div class="form-group">
                                <label>最大浏览数（0不限）</label>
                                <input type="number" class="form-control" id="advMaxViewCount" value="500" min="0">
                            </div>
                        </div>
                    </div>

                    <button class="btn btn-primary" id="createTaskBtn" style="margin-top:12px">创建任务</button>
                </div>
            </div>
        </div>
    </div>

    <!-- App 设备管理面板 -->
    <div class="panel panel-full" style="margin-top:16px;">
        <div class="panel-header">
            <h3>📱 App 设备管理</h3>
            <div style="display:flex; gap:8px;">
                <span class="status-badge" style="background:#e3f2fd;color:#1976d2;">已连接: <b id="appDeviceCount">0</b></span>
                <button class="btn btn-sm btn-default" onclick="loadAppDevices()">刷新</button>
            </div>
        </div>
        <div class="panel-body">
            <!-- 设备列表 -->
            <div id="appDeviceList" style="margin-bottom:16px;">
                <div class="empty-state">暂无设备连接。请在 iPhone 上安装并打开 AutoBot App，设置为同一网络下的服务器地址</div>
            </div>

            <!-- 任务执行区（选择设备后显示） -->
            <div id="appTaskSection" style="display:none;">
                <div style="background:#f5f5f5;padding:12px;border-radius:8px;margin-bottom:12px;">
                    <div style="font-size:13px;color:#666;margin-bottom:8px;">
                        当前设备: <b id="selectedDeviceName">-</b>
                        &nbsp;&nbsp;|&nbsp;&nbsp;
                        系统: <b id="selectedDeviceVersion">-</b>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
                    <div>
                        <div class="form-group">
                            <label>目标平台</label>
                            <select class="form-control" id="appTaskPlatform">
                                <option value="xiaohongshu">小红书</option>
                                <option value="douyin">抖音</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>浏览滚动次数</label>
                            <input type="number" class="form-control" id="appTaskScrollCount" value="10" min="1">
                        </div>
                        <div class="form-group">
                            <label>操作间隔（秒）</label>
                            <input type="number" class="form-control" id="appTaskInterval" value="2" min="0.5" step="0.5">
                        </div>
                    </div>
                    <div>
                        <div class="form-group">
                            <label>互动操作</label>
                            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                                <label style="display:flex; align-items:center; gap:6px;">
                                    <input type="checkbox" id="appTaskLike" checked>
                                    <span style="font-size:13px;">❤️ 点赞</span>
                                </label>
                                <label style="display:flex; align-items:center; gap:6px;">
                                    <input type="checkbox" id="appTaskFollow">
                                    <span style="font-size:13px;">👤 关注</span>
                                </label>
                                <label style="display:flex; align-items:center; gap:6px;">
                                    <input type="checkbox" id="appTaskComment">
                                    <span style="font-size:13px;">💬 评论</span>
                                </label>
                                <label style="display:flex; align-items:center; gap:6px;">
                                    <input type="checkbox" id="appTaskMessage">
                                    <span style="font-size:13px;">📨 私信</span>
                                </label>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>点赞概率（0-1）</label>
                            <input type="number" class="form-control" id="appTaskLikeRate" value="0.3" step="0.1" min="0" max="1">
                        </div>
                        <div class="form-group">
                            <label>评论内容库（一行一个）</label>
                            <textarea class="form-control" id="appTaskComments" rows="3" placeholder="太棒了！&#10;支持支持&#10;学习了&#10;哈哈哈哈"></textarea>
                        </div>
                    </div>
                </div>

                <div style="display:flex; gap:12px;">
                    <button class="btn btn-primary" id="startAppTaskBtn" onclick="startAppTask()">▶️ 开始执行</button>
                    <button class="btn btn-default" onclick="sendSingleAction('scroll')">测试: 滚动</button>
                    <button class="btn btn-default" onclick="sendSingleAction('like')">测试: 点赞</button>
                    <button class="btn btn-default" onclick="sendSingleAction('open_platform')">测试: 打开平台</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 执行日志 -->
    <div class="panel panel-full" id="logPanel" style="display:none; margin-top:16px;">
        <div class="panel-header">
            <h3>📝 执行日志</h3>
            <button class="btn btn-sm btn-default" onclick="clearAppLogs()">清空</button>
        </div>
        <div class="panel-body">
            <div id="appLogContent" style="font-family:monospace;font-size:12px;line-height:1.6;max-height:300px;overflow-y:auto;"></div>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        // App 设备相关功能

        var selectedDeviceId = null;
        var appLogEntries = [];

        // 加载 App 设备列表
        function loadAppDevices() {
            fetch('/api/app-devices')
                .then(r => r.json())
                .then(data => {
                    const devices = data.devices || [];
                    document.getElementById('appDeviceCount').textContent = devices.length;
                    renderAppDevices(devices);
                })
                .catch(err => {
                    document.getElementById('appDeviceList').innerHTML =
                        '<div class="empty-state">加载失败: ' + err + '</div>';
                });
        }

        function renderAppDevices(devices) {
            const html = devices.map(d => `
                <div class="device-card" style="border:1px solid #e0e0e0;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;${selectedDeviceId === d.device_id ? 'border-color:#2196f3;background:#e3f2fd;' : ''}" onclick="selectAppDevice('${d.device_id}', '${d.device_name}', '${d.system_version}')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-weight:600;">📱 ${d.device_name}</div>
                            <div style="font-size:12px;color:#666;margin-top:4px;">${d.system_version} | ${d.model} | ${d.app_version}</div>
                            <div style="font-size:12px;color:#888;margin-top:2px;">ID: ${d.device_id.substring(0, 12)}...</div>
                        </div>
                        <div style="text-align:right;">
                            <span style="display:inline-block;padding:4px 10px;border-radius:12px;font-size:11px;${d.status === 'running' ? 'background:#4caf50;color:white;' : 'background:#9e9e9e;color:white;'}">${d.status}</span>
                            ${d.platform ? `<div style="font-size:11px;color:#666;margin-top:4px;">${d.platform}</div>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');

            document.getElementById('appDeviceList').innerHTML =
                devices.length > 0 ? html : '<div class="empty-state">暂无设备连接。请在 iPhone 上安装并打开 AutoBot App</div>';
        }

        function selectAppDevice(deviceId, deviceName, systemVersion) {
            selectedDeviceId = deviceId;
            document.getElementById('selectedDeviceName').textContent = deviceName;
            document.getElementById('selectedDeviceVersion').textContent = systemVersion;
            document.getElementById('appTaskSection').style.display = 'block';
            document.getElementById('logPanel').style.display = 'block';
            loadAppDevices(); // 刷新高亮
            addAppLog(`已选择设备: ${deviceName}`, 'info');
        }

        // 发送单个操作（测试用）
        function sendSingleAction(action) {
            if (!selectedDeviceId) {
                alert('请先选择一个设备');
                return;
            }

            var params = {};
            if (action === 'open_platform') {
                params.platform = document.getElementById('appTaskPlatform').value;
            }

            addAppLog(`发送指令: ${action}`, 'action');

            fetch('/api/app-devices/' + selectedDeviceId + '/command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: action,
                    platform: document.getElementById('appTaskPlatform').value,
                    params: params
                })
            })
            .then(r => r.json())
            .then(data => {
                addAppLog(`结果: ${data.success ? '✅ 成功' : '❌ 失败'} - ${data.message}`, data.success ? 'success' : 'error');
            })
            .catch(err => {
                addAppLog(`错误: ${err}`, 'error');
            });
        }

        // 开始执行任务
        function startAppTask() {
            if (!selectedDeviceId) {
                alert('请先选择一个设备');
                return;
            }

            const platform = document.getElementById('appTaskPlatform').value;
            const scrollCount = parseInt(document.getElementById('appTaskScrollCount').value) || 10;
            const interval = parseFloat(document.getElementById('appTaskInterval').value) || 2;
            const likeEnabled = document.getElementById('appTaskLike').checked;
            const followEnabled = document.getElementById('appTaskFollow').checked;
            const commentEnabled = document.getElementById('appTaskComment').checked;
            const messageEnabled = document.getElementById('appTaskMessage').checked;
            const likeRate = parseFloat(document.getElementById('appTaskLikeRate').value) || 0.3;

            // 构建操作序列
            var operations = [
                { action: 'open_platform', params: { platform: platform } }
            ];

            var commentsRaw = document.getElementById('appTaskComments').value.trim();
            var comments = commentsRaw ? commentsRaw.split('\\n').filter(c => c.trim()) : ['很棒！', '支持支持', '学习了'];

            for (var i = 0; i < scrollCount; i++) {
                // 每次滚动后，根据概率执行互动
                if (likeEnabled && Math.random() < likeRate) {
                    operations.push({ action: 'like', params: {} });
                }
                if (commentEnabled && Math.random() < (likeRate * 0.5)) {
                    var commentText = comments[Math.floor(Math.random() * comments.length)];
                    operations.push({ action: 'comment', params: { text: commentText } });
                }
                if (followEnabled && Math.random() < (likeRate * 0.3)) {
                    operations.push({ action: 'follow', params: {} });
                }
                if (messageEnabled && Math.random() < (likeRate * 0.2)) {
                    operations.push({ action: 'message', params: { text: '你好！' } });
                }
                operations.push({ action: 'scroll', params: { direction: 'up', count: 1, interval: interval } });
            }

            addAppLog(`🚀 开始执行任务: ${operations.length} 个操作`, 'info');

            document.getElementById('startAppTaskBtn').disabled = true;
            document.getElementById('startAppTaskBtn').textContent = '⏳ 执行中...';

            fetch('/api/app-devices/' + selectedDeviceId + '/task', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    platform: platform,
                    operations: operations,
                    interval_between_operations: interval
                })
            })
            .then(r => r.json())
            .then(data => {
                const results = data.results || [];
                var successCount = 0;
                results.forEach((r, idx) => {
                    if (r.success) successCount++;
                    addAppLog(`步骤 ${idx + 1}: ${r.action} - ${r.success ? '✅' : '❌'} ${r.message}`, r.success ? 'success' : 'error');
                });
                addAppLog(`任务完成: ${successCount}/${results.length} 成功`, 'info');
            })
            .catch(err => {
                addAppLog(`任务失败: ${err}`, 'error');
            })
            .finally(() => {
                document.getElementById('startAppTaskBtn').disabled = false;
                document.getElementById('startAppTaskBtn').textContent = '▶️ 开始执行';
            });
        }

        function addAppLog(msg, type) {
            const time = new Date().toLocaleTimeString();
            const colorMap = {
                info: '#2196f3',
                action: '#ff9800',
                success: '#4caf50',
                error: '#f44336'
            };
            const color = colorMap[type || 'info'] || '#333';
            const html = `<div style="color:${color};">[${time}] ${msg}</div>`;
            appLogEntries.push(html);
            if (appLogEntries.length > 100) appLogEntries.shift();
            document.getElementById('appLogContent').innerHTML = appLogEntries.join('');
            document.getElementById('appLogContent').scrollTop = document.getElementById('appLogContent').scrollHeight;
        }

        function clearAppLogs() {
            appLogEntries = [];
            document.getElementById('appLogContent').innerHTML = '';
        }

        // 页面加载完成后自动加载
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成');
            loadAppDevices();

            // 每 10 秒刷新一次设备列表
            setInterval(function() {
                if (document.getElementById('appDeviceList')) {
                    loadAppDevices();
                }
            }, 10000);

            // 原有的任务创建按钮
            const btn = document.getElementById('createTaskBtn');
            if (btn) {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    createTask();
                });
            }
        });
    </script>
</body>
</html>
