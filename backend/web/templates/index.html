<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBot - iOS 自动化助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #f0f2f5; color: #1d1d1f; }
        .topbar { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 14px 24px; display: flex; align-items: center; gap: 20px; }
        .topbar h1 { font-size: 18px; font-weight: 700; }
        .tab-nav { background: white; display: flex; padding: 0 20px; border-bottom: 2px solid #e8eaed; }
        .tab-btn { padding: 12px 22px; font-size: 13.5px; font-weight: 500; color: #666; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.15s; user-select: none; }
        .tab-btn:hover { color: #333; background: #fafbfc; }
        .tab-btn.active { color: #2196f3; border-bottom-color: #2196f3; }
        .page-container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .panel { background: white; border-radius: 10px; padding: 18px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
        .panel-header h2 { font-size: 15px; font-weight: 600; }
        .status-badge { padding: 3px 11px; border-radius: 12px; font-size: 11.5px; background: #e8f5e9; color: #2e7d32; }
        .status-badge.blue { background: #e3f2fd; color: #1565c0; }
        .status-badge.gray { background: #eee; color: #777; }
        .device-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
        .device-card { border: 2px solid #e8eaed; border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.15s; }
        .device-card:hover { border-color: #90caf9; background: #f5f9ff; }
        .device-card.selected { border-color: #2196f3; background: #e3f2fd; }
        .device-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .device-info { font-size: 11px; color: #888; }
        .device-status { display: inline-block; padding: 2px 7px; border-radius: 6px; font-size: 10px; background: #e8f5e9; color: #2e7d32; margin-top: 5px; }
        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 500; }
        select, input, textarea { width: 100%; padding: 8px 10px; border: 1.5px solid #ddd; border-radius: 7px; font-size: 13px; font-family: inherit; }
        textarea { resize: vertical; min-height: 50px; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: #2196f3; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .btn { padding: 8px 16px; border: none; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
        .btn-primary { background: #2196f3; color: white; }
        .btn-primary:hover { background: #1976d2; }
        .btn-default { background: #f0f2f5; color: #444; border: 1px solid #ddd; }
        .btn-default:hover { background: #e4e7eb; }
        .quick-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
        .quick-actions .btn { padding: 5px 12px; font-size: 12px; }
        .checklist { display: flex; gap: 14px; flex-wrap: wrap; }
        .checklist label { display: flex; align-items: center; cursor: pointer; font-weight: normal; font-size: 13px; margin: 0; }
        .checklist input[type="checkbox"] { width: auto; margin-right: 5px; }
        .input-row { display: flex; gap: 10px; }
        .input-row > div { flex: 1; }
        .hint { font-size: 12px; color: #888; margin-bottom: 8px; }
        .empty-state { text-align: center; padding: 36px 10px; color: #999; font-size: 13px; }
        .mode-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
        .mode-tab { padding: 8px 18px; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; background: white; }
        .mode-tab.active { border-color: #2196f3; background: #e3f2fd; color: #1976d2; }
        .mode-panel { display: none; padding: 12px; background: #fafbfc; border-radius: 8px; border: 1px solid #e8e8e8; margin-top: 10px; }
        .mode-panel.active { display: block; }
        .sub-section { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
        .sub-section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .sub-section h4 { font-size: 13px; color: #333; margin-bottom: 8px; }
        .line-badge { display: inline-block; padding: 1px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .line-main { background: #fff3e0; color: #e65100; }
        .line-sec { background: #e8f5e9; color: #2e7d32; }
        .prob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        .prob-item label { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
        .prob-item input[type="number"] { width: 60px; text-align: center; padding: 4px 6px; }
        #logPanel { background: #1e1e2e; color: #cdd6f4; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 12px; max-height: 480px; overflow-y: auto; white-space: pre-wrap; line-height: 1.65; }
        .log-entry { padding: 1px 0; }
        .log-info { color: #89b4fa; }
        .log-success { color: #a6e3a1; }
        .log-error { color: #f38ba8; }
        .log-action { color: #f9e2af; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; padding: 8px 10px; background: #f8f9fa; font-weight: 600; color: #555; border-bottom: 2px solid #eee; }
        td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
        tr:hover td { background: #fafbff; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-dot.running { background: #f59e0b; animation: pulse 1.5s infinite; }
        .status-dot.waiting { background: #3b82f6; animation: pulse 2s infinite; }
        .status-dot.idle { background: #22c55e; }
        .status-dot.error { background: #ef4444; }
        .status-dot.completed { background: #8b5cf6; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .status-card { border: 1px solid #e0e0e0; border-radius: 10px; padding: 16px; margin-bottom: 12px; background: white; }
        .status-card.running { border-left: 4px solid #f59e0b; }
        .status-card.waiting { border-left: 4px solid #3b82f6; }
        .status-card.idle { border-left: 4px solid #22c55e; }
        .status-card.error { border-left: 4px solid #ef4444; }
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .status-title { font-weight: 600; font-size: 14px; }
        .status-time { font-size: 11px; color: #888; }
        .status-detail { font-size: 12px; color: #666; margin-top: 4px; line-height: 1.5; }
        .status-progress { height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin-top: 10px; }
        .status-progress-bar { height: 100%; background: linear-gradient(90deg, #f59e0b, #fbbf24); border-radius: 3px; transition: width 0.3s; }
        .activity-list { max-height: 300px; overflow-y: auto; }
        .activity-item { padding: 6px 0; border-bottom: 1px dashed #f0f0f0; font-size: 12px; display: flex; align-items: flex-start; gap: 8px; }
        .activity-time { color: #aaa; font-size: 11px; white-space: nowrap; }
        .activity-content { flex: 1; }
        .activity-running { color: #f59e0b; }
        .activity-success { color: #22c55e; }
        .activity-error { color: #ef4444; }
        .activity-info { color: #666; }
        @media (max-width: 768px) { .page-container { padding: 12px; } .input-row { flex-direction: column; } }
    </style>
</head>
<body>

<!-- 顶部栏 -->
<div class="topbar">
    <h1>📱 AutoBot</h1>
    <span>iOS 自动化助手 v3</span>
    <span id="globalDeviceBadge" style="font-size:12px;opacity:0.8;">0 台设备在线</span>
</div>

<!-- Tab 导航 -->
<nav class="tab-nav" id="tabNav">
    <div class="tab-btn active" data-page="devices" onclick="console.log('click devices');switchTab('devices')">📱 设备</div>
    <div class="tab-btn" data-page="tasks" onclick="console.log('click tasks');switchTab('tasks')">🚀 任务配置</div>
    <div class="tab-btn" data-page="templates" onclick="console.log('click templates');switchTab('templates')">📋 模板管理</div>
    <div class="tab-btn" data-page="schedule" onclick="console.log('click schedule');switchTab('schedule')">⏰ 定时任务</div>
    <div class="tab-btn" data-page="status" onclick="console.log('click status');switchTab('status')">🔄 实时状态</div>
    <div class="tab-btn" data-page="logs" onclick="console.log('click logs');switchTab('logs')">📜 执行日志</div>
</nav>

<div class="page-container">

<!-- 设备页 -->
<div class="page active" id="page-devices">
    <div class="panel">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;">
            <label style="font-size:12px;color:#888;margin:0;white-space:nowrap;">连接 Token:</label>
            <input type="password" id="authToken" placeholder="局域网使用可留空" style="flex:1;padding:6px 10px;font-size:12px;border-radius:6px;">
            <button class="btn btn-default" style="padding:5px 12px;font-size:11px;" onclick="saveToken()">保存</button>
        </div>
    </div>
    <div class="panel">
        <div class="panel-header"><h2>已连接设备</h2><span class="status-badge blue" id="selectedDeviceInfo">未选择设备</span></div>
        <div id="deviceList"><div class="empty-state">暂无设备连接</div></div>
    </div>
    <div class="panel">
        <div class="panel-header"><h2>⚡ 快捷操作</h2></div>
        <select id="platform" style="width:auto;min-width:120px;margin-bottom:10px;">
            <option value="xiaohongshu">小红书</option>
            <option value="douyin">抖音</option>
        </select>
        <div class="quick-actions">
            <button class="btn btn-default" onclick="sendSingleAction('open_platform')">打开平台</button>
            <button class="btn btn-default" onclick="sendScrollAction()">向下滚动</button>
            <button class="btn btn-default" onclick="sendSingleAction('like')">点赞</button>
            <button class="btn btn-default" onclick="sendSingleAction('click_random_note')">随机笔记</button>
            <button class="btn btn-default" onclick="sendSingleAction('collect')">收藏</button>
            <button class="btn btn-default" onclick="sendSingleAction('go_back')">返回</button>
            <button class="btn btn-info" onclick="sendSingleAction('page_info')">页面信息</button>
        </div>
        <div style="margin-top:12px;padding-top:12px;border-top:1px dashed #ddd;">
            <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px;">
                <label style="font-size:12px;color:#888;margin:0;white-space:nowrap;">🔍 搜索关键词:</label>
                <input type="text" id="searchKeyword" placeholder="输入关键词搜索" style="flex:1;padding:6px 10px;font-size:12px;border-radius:6px;border:1.5px solid #ddd;">
                <button class="btn btn-primary" style="padding:6px 14px;font-size:12px;background:#7c3aed;" onclick="sendSearchAction()">搜索</button>
            </div>
            <p class="hint" style="font-size:11px;color:#aaa;">💡 先打开平台，再输入关键词进行搜索</p>
        </div>
        <p class="hint" id="hint" style="margin-top:10px;">💡 先点击设备卡片选中设备</p>
    </div>
</div>

<!-- 任务配置页 -->
<div class="page" id="page-tasks">
    <div class="panel">
        <div class="panel-header"><h2>🚀 v3 智能任务</h2><span class="status-badge blue" id="taskDeviceBadge">-</span></div>
        <div class="mode-tabs">
            <div class="mode-tab active" onclick="switchMode('nurture')" id="tabNurture">🌱 养号模式</div>
            <div class="mode-tab" onclick="switchMode('work')" id="tabWork">💼 工作模式</div>
        </div>
        <div class="mode-panel active" id="panelNurture">
            <div class="sub-section">
                <h4>🔍 搜索关键词</h4>
                <textarea id="nurtureKeywords" placeholder="每行一个关键词">美食推荐
旅行攻略
穿搭分享</textarea>
            </div>
            <div class="input-row">
                <div class="form-group"><label>⏱️ 总时长最小(秒)</label><input type="number" id="nurtureDurMin" value="120" min="30" max="3600"></div>
                <div class="form-group"><label>⏱️ 总时长最大(秒)</label><input type="number" id="nurtureDurMax" value="300" min="30" max="7200"></div>
                <div class="form-group"><label>点赞率(0~1)</label><input type="number" id="nurtureLikeRate" value="0.7" min="0" max="1" step="0.1"></div>
            </div>
            <div class="input-row">
                <div class="form-group"><label>浏览(s)最小</label><input type="number" id="nurtureViewMin" value="3" min="1"></div>
                <div class="form-group"><label>浏览(s)最大</label><input type="number" id="nurtureViewMax" value="8" min="1"></div>
                <div class="form-group"><label>休息(s)最小</label><input type="number" id="nurtureRestMin" value="2" min="1"></div>
                <div class="form-group"><label>休息(s)最大</label><input type="number" id="nurtureRestMax" value="5" min="1"></div>
            </div>
        </div>
        <div class="mode-panel" id="panelWork">
            <div class="input-row">
                <div class="form-group"><label>总时长(分钟,0=不限)</label><input type="number" id="workDuration" value="0" min="0"></div>
                <div class="form-group"><label>浏览(s)最小</label><input type="number" id="workViewMin" value="5" min="1"></div>
                <div class="form-group"><label>浏览(s)最大</label><input type="number" id="workViewMax" value="15" min="1"></div>
            </div>
            <div class="sub-section">
                <h4>默认互动概率</h4>
                <div class="prob-grid">
                    <div class="prob-item"><label>点赞率<input type="number" id="probLike" value="0.65" min="0" max="1" step="0.05"></label></div>
                    <div class="prob-item"><label>评论率<input type="number" id="probComment" value="0.25" min="0" max="1" step="0.05"></label></div>
                    <div class="prob-item"><label>收藏率<input type="number" id="probCollect" value="0.08" min="0" max="1" step="0.05"></label></div>
                    <div class="prob-item"><label>关注率<input type="number" id="probFollow" value="0.03" min="0" max="1" step="0.05"></label></div>
                </div>
            </div>
            <div class="sub-section">
                <h4><span class="line-badge line-main">主线</span> 核心内容</h4>
                <div class="input-row">
                    <div class="form-group"><label>关键词</label><textarea id="mainKeywords">AI工具
效率提升</textarea></div>
                    <div class="form-group"><label>回复模板</label><textarea id="mainReplies">学到了！感谢分享
太有用了，已收藏</textarea></div>
                </div>
            </div>
            <div class="sub-section">
                <h4><span class="line-badge line-sec">次线</span> 副内容</h4>
                <div class="input-row">
                    <div class="form-group"><label>关键词</label><textarea id="secKeywords">生活日常
随拍</textarea></div>
                    <div class="form-group"><label>回复模板</label><textarea id="secReplies">不错哦
挺好的</textarea></div>
                </div>
            </div>
        </div>
        <hr style="margin:16px 0;border-top:1px dashed #ddd;">
        <div class="btn-row">
            <button class="btn btn-primary" style="background:#e65100;font-size:14px;padding:10px 28px;" onclick="startV3Task()">🚀 立即执行</button>
            <button class="btn btn-primary" style="font-size:13px;" onclick="showSaveTemplateModal()">💾 保存为模板</button>
        </div>
    </div>
</div>

<!-- 模板管理页 -->
<div class="page" id="page-templates">
    <div class="panel">
        <div class="panel-header">
            <h2>📋 任务模板</h2>
            <button class="btn btn-default" style="padding:5px 12px;font-size:12px;" onclick="loadTemplates()">刷新列表</button>
        </div>
        <div id="templateList"><div class="empty-state">点击刷新按钮加载模板</div></div>
    </div>
</div>

<!-- 定时任务页 -->
<div class="page" id="page-schedule">
    <div class="panel">
        <div class="panel-header">
            <h2>⏰ 定时任务调度</h2>
            <div style="display:flex;gap:6px;">
                <button class="btn btn-default" style="padding:5px 12px;font-size:12px;" onclick="loadSchedules()">刷新</button>
                <button class="btn btn-primary" style="padding:5px 12px;font-size:12px;background:#7c3aed;" onclick="showScheduleEditor()">+ 新建</button>
            </div>
        </div>
        <div id="scheduleList"><div class="empty-state">点击刷新按钮加载定时任务</div></div>
    </div>
</div>

<!-- 实时状态页 -->
<div class="page" id="page-status">
    <div class="panel">
        <div class="panel-header">
            <h2>🔄 实时状态监控</h2>
            <span class="status-badge" id="statusUpdateTime">上次更新: -</span>
        </div>
        <div id="statusContainer">
            <div class="empty-state">加载中...</div>
        </div>
    </div>
    <div class="panel">
        <div class="panel-header"><h2>📊 最近活动</h2></div>
        <div id="activityList" class="activity-list"><div class="empty-state">暂无活动记录</div></div>
    </div>
</div>

<!-- 日志页 -->
<div class="page" id="page-logs">
    <div class="panel">
        <div class="panel-header">
            <h2>📜 执行日志</h2>
            <button class="btn btn-default" style="padding:5px 12px;font-size:12px;" onclick="clearLog()">清空日志</button>
        </div>
        <div id="logPanel"></div>
    </div>
</div>

</div>

<script>
// ===== 调试：确认 JS 加载 =====
console.log('=== AutoBot v3 JS 开始加载 ===');
try {
    console.log('DOM ready, elements:', {
        tabNav: !!document.getElementById('tabNav'),
        logPanel: !!document.getElementById('logPanel'),
        deviceList: !!document.getElementById('deviceList')
    });
} catch(e) { console.error('DOM check error:', e); }

// ===== Tab 切换 =====
function switchTab(pageName) {
    console.log('switchTab called:', pageName);
    try {
        document.querySelectorAll('.tab-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn.getAttribute('data-page') === pageName);
        });
        document.querySelectorAll('.page').forEach(function(p) {
            p.classList.toggle('active', p.id === 'page-' + pageName);
        });
        if (pageName === 'templates') loadTemplates();
        if (pageName === 'schedule') loadSchedules();
        if (pageName === 'status') loadStatus();
        console.log('switchTab done:', pageName);
    } catch(e) { console.error('switchTab error:', e); }
}

// ===== 全局状态 =====
var selectedDeviceId = null;
var deviceList = [];

// ===== 工具函数 =====
function addLog(text, type) {
    try {
        var div = document.createElement('div');
        div.className = 'log-entry log-' + (type || 'info');
        var time = new Date().toLocaleTimeString();
        div.textContent = '[' + time + '] ' + text;
        var panel = document.getElementById('logPanel');
        if (panel) { panel.appendChild(div); panel.scrollTop = panel.scrollHeight; }
        else { console.log('[LOG]', text); }
    } catch(e) { console.log('[LOG]', text, '(error:', e, ')'); }
}
function clearLog() {
    var panel = document.getElementById('logPanel');
    if (panel) panel.innerHTML = '';
}
function saveToken() {
    var t = document.getElementById('authToken').value.trim();
    if (t) localStorage.setItem('autobot_token', t);
    addLog('Token 已保存', 'success');
}

function apiFetch(url, options) {
    var token = document.getElementById('authToken').value.trim();
    if (token) {
        localStorage.setItem('autobot_token', token);
        options = options || {};
        options.headers = options.headers || {};
        options.headers['X-Auth-Token'] = token;
    }
    return fetch(url, options);
}

(function(){
    var saved = localStorage.getItem('autobot_token');
    if (saved) { var el = document.getElementById('authToken'); if (el) el.value = saved; }
})();

// ===== 设备列表 =====
function renderDevices(devices) {
    deviceList = devices || [];
    var badge = document.getElementById('globalDeviceBadge');
    if (badge) badge.textContent = deviceList.length + ' 台设备在线';
    if (deviceList.length === 0) {
        document.getElementById('deviceList').innerHTML = '<div class="empty-state">暂无设备连接</div>';
        return;
    }
    var html = '<div class="device-list">';
    devices.forEach(function(d) {
        var isSelected = selectedDeviceId === d.device_id ? 'selected' : '';
        html += '<div class="device-card ' + isSelected + '" data-id="' + d.device_id + '" data-name="' + (d.device_name || 'iPhone') + '">';
        html += '<div class="device-name">' + (d.device_name || 'iPhone') + '</div>';
        html += '<div class="device-info">' + (d.system_version || '') + ' | App v' + (d.app_version || '') + '</div>';
        html += '<span class="device-status">' + (d.status || 'idle') + '</span>';
        html += '</div>';
    });
    html += '</div>';
    document.getElementById('deviceList').innerHTML = html;
    document.querySelectorAll('.device-card').forEach(function(card) {
        card.addEventListener('click', function() {
            selectDevice(card.getAttribute('data-id'), card.getAttribute('data-name'));
        });
    });
}

function selectDevice(deviceId, deviceName) {
    selectedDeviceId = deviceId;
    addLog('已选择设备: ' + deviceName, 'info');
    document.querySelectorAll('.device-card').forEach(function(card) {
        card.classList.toggle('selected', card.getAttribute('data-id') === deviceId);
    });
    var badge = document.getElementById('taskDeviceBadge');

var taskStatusList = {};
var activityLog = [];
function connectFrontendWS() {
    try {
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var ws = new WebSocket(proto + '//' + location.host + '/ws/frontend');
        ws.onmessage = function(event) {
            try {
                var data = JSON.parse(event.data);
                if (data.type === 'app_devices') renderDevices(data.devices || []);
                else if (data.type === 'log') addLog(data.message, data.level || 'info');
                else if (data.type === 'schedule_event') addLog(data.message, 'action');
                else if (data.type === 'task_status') handleTaskStatus(data);
            } catch(e) {}
        };
        ws.onclose = function() { setTimeout(connectFrontendWS, 3000); };
        ws.onerror = function() {};
    } catch(e) { console.log('WebSocket 连接失败:', e); }
}
function handleTaskStatus(data) {
    taskStatusList[data.job_id] = data;
    var timeStr = data.timestamp ? data.timestamp.substring(11, 19) : new Date().toLocaleTimeString();
    var level = data.status === 'error' ? 'activity-error' : data.status === 'running' ? 'activity-running' : data.status === 'idle' || data.status === 'completed' ? 'activity-success' : 'activity-info';
    activityLog.unshift({ time: timeStr, message: data.message || '', level: level });
    if (activityLog.length > 50) activityLog.pop();
    renderActivityList();
    if (document.getElementById('page-status').classList.contains('active')) {
        renderStatus();
    }
}
function loadStatus() {
    apiFetch('/api/schedules').then(function(r){return r.json();}).then(function(data){
        data.schedules.forEach(function(job){
            if (!taskStatusList[job.id]) {
                taskStatusList[job.id] = {
                    job_id: job.id,
                    status: job.status,
                    device_id: job.current_device_id,
                    template_id: job.current_template_id,
                    message: '',
                    timestamp: job.last_executed_at || new Date().toISOString()
                };
            }
        });
        renderStatus();
    });
}
function renderStatus() {
    var container = document.getElementById('statusContainer');
    var now = new Date();
    document.getElementById('statusUpdateTime').textContent = '上次更新: ' + now.toLocaleTimeString();
    
    var jobs = Object.values(taskStatusList);
    if (jobs.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无任务状态</div>';
        return;
    }
    
    var html = '';
    var statusMap = { 'running': '运行中', 'waiting': '等待中', 'idle': '空闲', 'error': '错误', 'completed': '已完成' };
    
    jobs.forEach(function(s) {
        var timeStr = s.timestamp ? s.timestamp.substring(11, 19) : '-';
        var deviceInfo = s.device_id ? '设备: ' + s.device_id.substring(0, 8) : '';
        html += '<div class="status-card ' + s.status + '">';
        html += '<div class="status-header"><span class="status-title"><span class="status-dot ' + s.status + '"></span>' + (s.job_name || '任务 ' + s.job_id.substring(0, 8)) + '</span>';
        html += '<span class="status-time">' + timeStr + ' · ' + (statusMap[s.status] || s.status) + '</span></div>';
        html += '<div class="status-detail">' + (s.message || deviceInfo || '暂无详细信息') + '</div>';
        if (s.status === 'running' || s.status === 'waiting') {
            html += '<div class="status-progress"><div class="status-progress-bar" style="width:' + (Math.random() * 60 + 20) + '%"></div></div>';
        }
        html += '</div>';
    });
    
    container.innerHTML = html;
}
function renderActivityList() {
    var container = document.getElementById('activityList');
    if (activityLog.length === 0) {
        container.innerHTML = '<div class="empty-state">暂无活动记录</div>';
        return;
    }
    
    var html = '';
    activityLog.forEach(function(item) {
        html += '<div class="activity-item"><span class="activity-time">' + item.time + '</span><span class="activity-content ' + item.level + '">' + item.message + '</span></div>';
    });
    
    container.innerHTML = html;
}

function getVal(id,d){var e=document.getElementById(id);return e&&e.value!==''?e.value:d;}
function getNum(id,d){var v=parseFloat(getVal(id,''));return isNaN(v)?d:v;}
function getInt(id,d){var v=parseInt(getVal(id,''));return isNaN(v)?d:v;}
function getLines(id){var t=(getVal(id,'')||'').trim();return t?t.split('\n').map(function(s){return s.trim();}).filter(function(s){return s.length>0;}):[];}
function setVal(id,v){var el=document.getElementById(id);if(el)el.value=v;}

function buildV3Config() {
    if(currentMode==='nurture'){
        return{mode:'nurture',platform:document.getElementById('platform').value,nurture:{
            searchKeywords:getLines('nurtureKeywords'),useSearch:true,
            likeRate:getNum('nurtureLikeRate',0.7),
            durationRange:{min:getInt('nurtureDurMin',120),max:getInt('nurtureDurMax',300)},
            viewTimeRange:{min:getInt('nurtureViewMin',3),max:getInt('nurtureViewMax',8)},
            restRange:{min:getInt('nurtureRestMin',2),max:getInt('nurtureRestMax',5)},
            keywordRestRange:{min:5,max:15}

    }else{
        return{mode:'work',platform:document.getElementById('platform').value,work:{
            totalDurationMinutes:getInt('workDuration',0),
            viewTimeRange:{min:getInt('workViewMin',5),max:getInt('workViewMax',15)},
            restBetweenNotes:{min:3,max:8},
            restBetweenLines:{min:15,max:40},
            browseComments:true,commentScrollCount:2,
            defaultProbabilities:{likeRate:getNum('probLike',0.65),commentRate:getNum('probComment',0.25),replyRate:0.15,collectRate:getNum('probCollect',0.08),followRate:getNum('probFollow',0.03)},
            mainLine:{name:'主线',keywords:getLines('mainKeywords'),mentionAccounts:[],mentionProbability:0.3,notesPerRound:3,defaultReplies:getLines('mainReplies'),keywordReplies:{},probabilities:null},
            secondaryLine:{name:'次线',keywords:getLines('secKeywords'),notesPerRound:2,defaultReplies:getLines('secReplies'),keywordReplies:{},probabilities:null},

function startV3Task() {

function loadTemplateToForm(tid){
    apiFetch('/api/templates/'+tid).then(function(r){return r.json();}).then(function(tpl){
        if(tpl.config&&tpl.config.mode==='nurture'){
            switchMode('nurture');var n=tpl.config.nurture;

function renderScheduleList(schedules){
    var container=document.getElementById('scheduleList');
    if(schedules.length===0){container.innerHTML='<div class="empty-state">暂无定时任务</div>';return;}
    var TL={once:'一次性',daily:'每日循环',interval:'间隔执行'};
    var statusColors={running:'background:#f59e0b;color:white;',waiting:'background:#3b82f6;color:white;',idle:'background:#22c55e;color:white;',error:'background:#ef4444;color:white;',completed:'background:#8b5cf6;color:white;'};
    var statusLabels={running:'运行中',waiting:'等待中',idle:'空闲',error:'错误',completed:'已完成'};
    var html='';
    schedules.forEach(function(job){
        var nr=job.next_run?job.next_run.substring(0,16).replace('T',' '):'-';
        var lastResult=job.last_execution_result?' | 上次: '+job.last_execution_result:'';
        html+='<div style="border:1px solid #e0e0e0;border-radius:8px;padding:12px;margin-bottom:8px;">';

        html+='<span><span class="status-badge'+(job.enabled?'':' gray')+'" style="margin-right:4px;">'+(job.enabled?'启用':'禁用')+'</span>';
        html+='<span class="status-badge" style="background:#fff3e0;color:#e65100;margin-right:4px;">'+ (TL[job.schedule_type]||job.schedule_type)+'</span>';
        html+='<span class="status-badge" style="'+(statusColors[job.status]||'background:#999;color:white;')+'"><span class="status-dot '+job.status+'" style="margin-right:2px;"></span>'+(statusLabels[job.status]||job.status)+'</span></span></div>';
        html+='<div style="font-size:12px;color:#666;margin:6px 0;">下次: <b>'+nr+'</b> | 已执行: <b>'+job.execution_count+'</b> 次'+lastResult+'</div>';
        if(job.status==='running' || job.status==='waiting'){
            var deviceInfo=job.current_device_id?'正在执行设备: '+job.current_device_id.substring(0,8):'';
            html+='<div style="font-size:12px;color:#f59e0b;margin-bottom:6px;">📱 '+deviceInfo+'</div>';
        }
        html+='<div style="display:flex;gap:4px;">';
        html+='<button class="btn btn-default" style="padding:2px 8px;font-size:11px;" onclick="editSchedule(\''+job.id+'\')">编辑</button> ';
        html+='<button class="btn btn-default" style="padding:2px 8px;font-size:11px;" onclick="toggleSchedule(\''+job.id+'\','+!job.enabled+')">'+(job.enabled?'暂停':'启用')+'</button> ';
        html+='<button class="btn btn-default" style="padding:2px 8px;font-size:11px;" onclick="triggerSchedule(\''+job.id+'\')">立即执行</button> ';
        html+='<button class="btn btn-default" style="padding:2px 8px;font-size:11px;color:#e53935;" onclick="deleteSchedule(\''+job.id+'\')">删除</button>';
        html+='</div></div>';
    });container.innerHTML=html;
}

    document.getElementById('assignmentList').appendChild(row);
    deviceList.forEach(function(d){var o=document.createElement('option');o.value=d.device_id;o.textContent=d.device_name||d.device_id.substr(0,8);row.querySelector('.assign-device-select').appendChild(o);});
    templateList.forEach(function(t){var o=document.createElement('option');o.value=t.id;o.textContent=t.name;row.querySelector('.assign-template-select').appendChild(o);});
    if(preData.device_id)row.querySelector('.assign-device-select').value=preData.device_id;
    if(preData.template_id)row.querySelector('.assign-template-select').value=preData.template_id;
}
function collectAssignments(){
    var rows=document.querySelectorAll('[id^="assignRow_"]'),as=[];
    rows.forEach(function(row){
        var did=row.querySelector('.assign-device-select').value,tid=row.querySelector('.assign-template-select').value;
        if(did&&tid)as.push({device_id:did,template_id:tid,rest_before_min:parseInt(row.querySelector('.assign-rest-before-min').value)||5,rest_before_max:parseInt(row.querySelector('.assign-rest-before-max').value)||15,interval_after_min:0,interval_after_max:0});
    });return as;
}
function saveScheduleFromModal(){
    var name=document.getElementById('schName').value.trim();
    if(!name){alert('请输入名称');return;}
    var st=document.getElementById('schType').value,body={id:editingScheduleId,name:name,enabled:document.getElementById('schEnabled').value==='true',schedule_type:st,max_executions:getInt('schMaxExec',0),assignments:collectAssignments()};
    if(st==='once'){var s=document.getElementById('schStartTime').value;if(!s){alert('选择时间');return;}body.start_time=s+':00';}
    else if(st==='daily'){var ts=getLines('schDailyTimes');if(ts.length===0){alert('输入时间点');return;}body.daily_times=ts;}
    else if(st==='interval'){
                var minInt=getInt('schIntervalMin',30),maxInt=getInt('schIntervalMax',60);
                body.interval_min_minutes=Math.min(minInt,maxInt);
                body.interval_max_minutes=Math.max(minInt,maxInt);
            }
    apiFetch('/api/schedules',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json();}).then(function(data){addLog('⏰ 已保存: '+data.name,'success');closeScheduleModal();loadSchedules();})
    .catch(function(err){addLog('保存失败: '+err,'error');});
}
function closeScheduleModal(){var el=document.getElementById('scheduleModal');if(el)el.remove();editingScheduleId=null;assignmentRowCount=0;}
function editSchedule(id){showScheduleEditor(id);}
function toggleSchedule(id,en){apiFetch('/api/schedules/'+id+'/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled:en})}).then(function(){loadSchedules();addLog((en?'启用':'暂停')+'了定时任务','info');});}
function triggerSchedule(id){
    console.log('Triggering schedule:', id);
    apiFetch('/api/schedules/'+id+'/trigger',{method:'POST'})
        .then(function(r){ 
            console.log('Trigger API response:', r.status);
            return r.json();
        })
        .then(function(data){
            console.log('Trigger result:', data);
            if(data.success){
                addLog('⏰ 已触发执行','success');
                loadSchedules();
            }else{
                addLog('触发失败: '+(data.message||''),'error');
            }
        })
        .catch(function(err){
            console.error('Trigger error:', err);
            addLog('触发请求失败: '+err.message,'error');
        });
}
function deleteSchedule(id){if(!confirm('确定删除？'))return;apiFetch('/api/schedules/'+id,{method:'DELETE'}).then(function(){addLog('🗑️ 已删除','info');loadSchedules();});}
