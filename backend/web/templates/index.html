<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBot - iOS 自动化助手</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #f5f5f7; color: #1d1d1f; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { font-size: 24px; margin-bottom: 16px; font-weight: 600; }
        h2 { font-size: 16px; margin-bottom: 10px; font-weight: 600; }

        .panel { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; background: #e8f5e9; color: #2e7d32; }
        .status-badge.warning { background: #fff3e0; color: #e65100; }
        .status-badge.gray { background: #e0e0e0; color: #555; }

        .device-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
        .device-card { border: 2px solid #e0e0e0; border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.15s; }
        .device-card:hover { border-color: #2196f3; background: #f8fbff; }
        .device-card.selected { border-color: #2196f3; background: #e3f2fd; }
        .device-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
        .device-info { font-size: 11px; color: #666; line-height: 1.5; }
        .device-status { display: inline-block; padding: 2px 6px; border-radius: 6px; font-size: 10px; margin-top: 4px; background: #e8f5e9; color: #2e7d32; }

        .form-group { margin-bottom: 10px; }
        label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 500; }
        select, input, textarea { width: 100%; padding: 8px 10px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 13px; font-family: inherit; }
        textarea { resize: vertical; min-height: 50px; }
        select:focus, input:focus, textarea:focus { outline: none; border-color: #2196f3; }

        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
        .btn { padding: 8px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; }
        .btn-primary { background: #2196f3; color: white; }
        .btn-primary:hover { background: #1976d2; }
        .btn-default { background: #eef0f3; color: #1d1d1f; }
        .btn-default:hover { background: #e0e2e7; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .checklist { display: flex; gap: 12px; flex-wrap: wrap; }
        .checklist label { display: flex; align-items: center; cursor: pointer; font-weight: normal; font-size: 13px; margin: 0; }
        .checklist input[type="checkbox"] { width: auto; margin-right: 6px; }

        #logPanel { background: #1e1e1e; color: #d4d4d4; border-radius: 8px; padding: 12px; font-family: "SF Mono", Consolas, monospace; font-size: 12px; max-height: 260px; overflow-y: auto; white-space: pre-wrap; }
        .log-entry { padding: 1px 0; }
        .log-entry.info { color: #7fc1ff; }
        .log-entry.success { color: #90ee90; }
        .log-entry.error { color: #f48771; }
        .log-entry.action { color: #ffd700; }

        .empty-state { text-align: center; padding: 30px 10px; color: #888; font-size: 13px; }
        .input-row { display: flex; gap: 10px; }
        .input-row > div { flex: 1; }

        .hint { font-size: 12px; color: #888; margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📱 AutoBot - iOS 自动化助手</h1>

    <!-- 设备列表 -->
    <div class="panel">
        <div class="panel-header">
            <h2>已连接设备 <small style="font-weight: normal; color: #888; font-size: 12px;">点击设备卡片选中它</small></h2>
            <span class="status-badge" id="deviceCount">0 台在线</span>
        </div>
        <div id="deviceList"></div>
    </div>

    <!-- 任务配置区 -->
    <div class="panel">
        <div class="panel-header">
            <h2>📋 任务配置</h2>
            <span class="status-badge gray" id="selectedDevice">未选择设备</span>
        </div>

        <div class="form-group">
            <label>目标平台</label>
            <select id="platform">
                <option value="xiaohongshu">小红书</option>
                <option value="douyin">抖音</option>
            </select>
        </div>

        <div class="input-row">
            <div class="form-group">
                <label>滚动次数</label>
                <input type="number" id="scrollCount" value="5" min="1" max="100">
            </div>
            <div class="form-group">
                <label>操作间隔(秒)</label>
                <input type="number" id="interval" value="1.5" min="0.5" max="10" step="0.1">
            </div>
        </div>

        <div class="form-group">
            <label>执行操作</label>
            <div class="checklist">
                <label><input type="checkbox" id="chkScroll" checked> 滚动</label>
                <label><input type="checkbox" id="chkLike"> ❤️ 点赞</label>
                <label><input type="checkbox" id="chkFollow"> ➕ 关注</label>
                <label><input type="checkbox" id="chkComment"> 💬 评论</label>
            </div>
        </div>

        <div class="form-group" id="commentBox" style="display:none;">
            <label>评论内容（每行一条，随机使用）</label>
            <textarea id="commentText">太棒了！
支持一下
学到了
哈哈哈</textarea>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" id="startTaskBtn" onclick="startTask()">▶️ 开始执行</button>
            <button class="btn btn-default" onclick="sendSingleAction('open_platform')">测试: 打开平台</button>
            <button class="btn btn-default" onclick="sendSingleAction('scroll')">测试: 滚动</button>
            <button class="btn btn-default" onclick="sendSingleAction('like')">测试: 点赞</button>
        </div>

        <div class="hint" id="hint" style="margin-top: 10px;">💡 先在上方点击一个设备卡片，然后开始执行任务</div>
    </div>

    <!-- 日志面板 -->
    <div class="panel">
        <div class="panel-header">
            <h2>📜 执行日志</h2>
            <button class="btn btn-default" style="padding:4px 10px;font-size:11px;" onclick="clearLog()">清空</button>
        </div>
        <div id="logPanel">日志将在这里显示...</div>
    </div>
</div>

<script>
    // ============ 全局状态 ============
    var selectedDeviceId = null;
    var deviceList = [];
    var ws = null;

    // ============ 工具函数 ============
    function addLog(text, type) {
        var div = document.createElement('div');
        div.className = 'log-entry ' + (type || '');
        var time = new Date().toLocaleTimeString();
        div.textContent = '[' + time + '] ' + text;
        document.getElementById('logPanel').appendChild(div);
        document.getElementById('logPanel').scrollTop = document.getElementById('logPanel').scrollHeight;
    }

    function clearLog() {
        document.getElementById('logPanel').innerHTML = '';
    }

    // ============ 设备列表渲染 ============
    function renderDevices(devices) {
        deviceList = devices || [];
        document.getElementById('deviceCount').textContent = (deviceList.length) + ' 台在线';

        if (deviceList.length === 0) {
            document.getElementById('deviceList').innerHTML =
                '<div class="empty-state">暂无设备连接。<br><br>请在 iPhone 上安装并打开 AutoBot App，<br>在同一 WiFi 网络下连接此服务器。</div>';
            updateSelectedDeviceUI();
            return;
        }

        var html = '<div class="device-list">';
        devices.forEach(function(d) {
            var isSelected = (selectedDeviceId && selectedDeviceId === d.device_id) ? 'selected' : '';
            html += '<div class="device-card ' + isSelected + '" data-device-id="' + d.device_id + '" data-device-name="' + (d.device_name || 'iPhone') + '">';
            html += '<div class="device-name">📱 ' + (d.device_name || 'iPhone') + '</div>';
            html += '<div class="device-info">' + (d.system_version || '') + ' | App v' + (d.app_version || '') + '</div>';
            html += '<div class="device-info">Model: ' + (d.model || '') + '</div>';
            html += '<span class="device-status">' + (d.status || 'idle') + '</span>';
            html += '</div>';
        });
        html += '</div>';
        document.getElementById('deviceList').innerHTML = html;

        // 事件委托绑定点击
        document.querySelectorAll('.device-card').forEach(function(card) {
            card.addEventListener('click', function() {
                selectDevice(card.getAttribute('data-device-id'), card.getAttribute('data-device-name'));
            });
        });
    }

    // ============ 选中设备 ============
    function selectDevice(deviceId, deviceName) {
        selectedDeviceId = deviceId;
        updateSelectedDeviceUI();
        addLog('已选择设备: ' + deviceName, 'info');

        // 刷新设备列表高亮
        document.querySelectorAll('.device-card').forEach(function(card) {
            if (card.getAttribute('data-device-id') === deviceId) {
                card.classList.add('selected');
            } else {
                card.classList.remove('selected');
            }
        });
    }

    function updateSelectedDeviceUI() {
        if (selectedDeviceId) {
            var dev = deviceList.find(function(d) { return d.device_id === selectedDeviceId; });
            var name = dev ? dev.device_name : '设备';
            document.getElementById('selectedDevice').textContent = name;
            document.getElementById('selectedDevice').className = 'status-badge';
            document.getElementById('hint').textContent = '✅ 已选中设备，可以开始执行任务';
            document.getElementById('startTaskBtn').disabled = false;
        } else {
            document.getElementById('selectedDevice').textContent = '未选择设备';
            document.getElementById('selectedDevice').className = 'status-badge gray';
            document.getElementById('hint').textContent = '💡 先在上方点击一个设备卡片，然后开始执行任务';
            document.getElementById('startTaskBtn').disabled = true;
        }
    }

    // ============ 刷新设备列表（REST API） ============
    function loadDevices() {
        fetch('/api/app-devices')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                renderDevices(data.devices || []);
                // 如果之前选过设备，检查是否仍然存在
                if (selectedDeviceId) {
                    var exists = (data.devices || []).some(function(d) {
                        return d.device_id === selectedDeviceId;
                    });
                    if (!exists) {
                        selectedDeviceId = null;
                        updateSelectedDeviceUI();
                    }
                }
            })
            .catch(function(err) {
                document.getElementById('deviceList').innerHTML =
                    '<div class="empty-state">加载失败: ' + err + '</div>';
            });
    }

    // ============ WebSocket 实时更新 ============
    function connectFrontendWS() {
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(proto + '//' + location.host + '/ws/frontend');

        ws.onmessage = function(event) {
            try {
                var data = JSON.parse(event.data);
                if (data.type === 'app_devices') {
                    renderDevices(data.devices || []);
                }
            } catch (e) {
                console.error('解析失败', e);
            }
        };

        ws.onclose = function() {
            setTimeout(connectFrontendWS, 3000);
        };

        ws.onerror = function() {};
    }

    // ============ 发送单个指令 ============
    function sendSingleAction(action) {
        if (!selectedDeviceId) {
            alert('请先点击上方的设备卡片选择一个设备');
            return;
        }

        var params = {};
        if (action === 'open_platform') {
            params.platform = document.getElementById('platform').value;
        } else if (action === 'scroll') {
            params.direction = 'up';
            params.count = 1;
            params.interval = 1;
        } else if (action === 'comment') {
            params.text = '测试评论';
        }

        addLog('发送指令: ' + action, 'action');

        fetch('/api/app-devices/' + encodeURIComponent(selectedDeviceId) + '/command', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                action: action,
                platform: document.getElementById('platform').value,
                params: params
            })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.success) {
                addLog('✅ 成功 - ' + (data.message || action), 'success');
            } else {
                addLog('❌ 失败 - ' + (data.message || '未知错误'), 'error');
            }
        })
        .catch(function(err) {
            addLog('请求错误: ' + err, 'error');
        });
    }

    // ============ 开始执行复合任务 ============
    function startTask() {
        if (!selectedDeviceId) {
            alert('请先点击上方的设备卡片选择一个设备');
            return;
        }

        var platform = document.getElementById('platform').value;
        var scrollCount = parseInt(document.getElementById('scrollCount').value) || 5;
        var interval = parseFloat(document.getElementById('interval').value) || 1.5;
        var likeEnabled = document.getElementById('chkLike').checked;
        var followEnabled = document.getElementById('chkFollow').checked;
        var commentEnabled = document.getElementById('chkComment').checked;
        var scrollEnabled = document.getElementById('chkScroll').checked;

        // 构建操作列表
        var operations = [{ action: 'open_platform', params: {} }];

        for (var i = 0; i < scrollCount; i++) {
            if (scrollEnabled) {
                operations.push({ action: 'scroll', params: { direction: 'up', count: 1, interval: interval } });
            }
            if (likeEnabled) {
                operations.push({ action: 'like', params: {} });
            }
            if (followEnabled) {
                operations.push({ action: 'follow', params: {} });
            }
            if (commentEnabled) {
                var lines = document.getElementById('commentText').value.trim().split('\n');
                var text = lines[Math.floor(Math.random() * lines.length)] || '支持';
                operations.push({ action: 'comment', params: { text: text } });
            }
        }

        addLog('开始执行任务 - ' + platform + ', ' + operations.length + ' 个操作', 'action');

        document.getElementById('startTaskBtn').disabled = true;
        var originalText = document.getElementById('startTaskBtn').textContent;
        document.getElementById('startTaskBtn').textContent = '⏳ 执行中...';

        fetch('/api/app-devices/' + encodeURIComponent(selectedDeviceId) + '/task', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                platform: platform,
                operations: operations,
                interval_between_operations: interval
            })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            addLog('任务完成: ' + data.success_count + '/' + data.total_operations + ' 成功', 'success');
            if (data.results && data.results.forEach) {
                data.results.forEach(function(r) {
                    if (r.success) {
                        addLog('  ✅ ' + r.action + ' - ' + r.message, 'success');
                    } else {
                        addLog('  ❌ ' + r.action + ' - ' + r.message, 'error');
                    }
                });
            }
        })
        .catch(function(err) {
            addLog('任务执行错误: ' + err, 'error');
        })
        .finally(function() {
            document.getElementById('startTaskBtn').disabled = false;
            document.getElementById('startTaskBtn').textContent = originalText;
        });
    }

    // 评论框显示
    document.getElementById('chkComment').addEventListener('change', function() {
        document.getElementById('commentBox').style.display = this.checked ? 'block' : 'none';
    });

    // 初始化
    document.getElementById('startTaskBtn').disabled = true;
    addLog('页面已加载，等待设备连接...', 'info');
    connectFrontendWS();
    loadDevices();
    setInterval(loadDevices, 15000);  // 每 15 秒轮询一次作为备份
</script>
</body>
</html>
