<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBot Test</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .tab-nav { display: flex; gap: 4px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; background: #eee; cursor: pointer; border-radius: 6px; user-select: none; }
        .tab-btn.active { background: #2196f3; color: white; }
        .page { display: none; padding: 20px; background: #f5f5f5; border-radius: 8px; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <h1>AutoBot - 测试页面</h1>
    <p id="testStatus">JS 状态: 等待中...</p>

    <div class="tab-nav">
        <div class="tab-btn active" onclick="switchTab('device')">设备</div>
        <div class="tab-btn" onclick="switchTab('task')">任务</div>
        <div class="tab-btn" onclick="switchTab('log')">日志</div>
    </div>

    <div class="page active" id="page-device">📱 设备页面内容</div>
    <div class="page" id="page-task">🚀 任务页面内容</div>
    <div class="page" id="page-log">📜 日志页面内容</div>

    <script>
        document.getElementById('testStatus').textContent = 'JS 状态: ✅ 正常执行!';
        document.getElementById('testStatus').style.color = 'green';
        console.log('Test page JS loaded successfully');

        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.trim().startsWith(name === 'device' ? '设备' : name === 'task' ? '任务' : '日志'));
            });
            document.querySelectorAll('.page').forEach(function(p) {
                p.classList.toggle('active', p.id === 'page-' + name);
            });
            console.log('Switched to tab:', name);
        }
    </script>
</body>
</html>
